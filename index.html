<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CricTrack - Cricket Match Manager</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{font-family:'DM Sans',sans-serif;background:#0a1628;color:#e8dcc8;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
img,canvas{max-width:100%}
.app{max-width:900px;margin:0 auto;padding:16px}
h1,h2,h3{font-family:'Playfair Display',serif}
.logo{text-align:center;padding:20px 0 12px;border-bottom:1px solid #1e3a5f;margin-bottom:20px}
.logo h1{font-size:2rem;color:#d4a843;letter-spacing:2px}
.logo p{color:#7a9dbf;font-size:0.8rem;letter-spacing:3px;text-transform:uppercase;margin-top:4px}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:20px;border:1px solid #1e3a5f;background:transparent;color:#7a9dbf;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:500;transition:all 0.2s}
.tab.active,.tab:hover{background:#d4a843;color:#0a1628;border-color:#d4a843}
.card{background:#0f2040;border:1px solid #1e3a5f;border-radius:16px;padding:20px;margin-bottom:16px}
.card h2{font-size:1.2rem;color:#d4a843;margin-bottom:16px}
.card h3{font-size:1rem;color:#b8cfe8;margin-bottom:12px}
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.9rem;transition:all 0.15s}
.btn:active{transform:scale(0.97)}
.btn-gold{background:#d4a843;color:#0a1628}
.btn-gold:hover{background:#e8bc55}
.btn-outline{background:transparent;border:1px solid #1e3a5f;color:#b8cfe8}
.btn-outline:hover{border-color:#d4a843;color:#d4a843}
.btn-danger{background:#c0392b;color:#fff}
.btn-danger:hover{background:#e74c3c}
.btn-green{background:#27ae60;color:#fff}
.btn-green:hover{background:#2ecc71}
.btn-sm{padding:6px 12px;font-size:0.8rem;border-radius:6px}
.btn-big{padding:18px 32px;font-size:1.1rem;border-radius:12px}
.input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #1e3a5f;background:#0a1628;color:#e8dcc8;font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none}
.input:focus{border-color:#d4a843}
.label{font-size:0.8rem;color:#7a9dbf;margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:1px}
.field{margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.player-card{background:#0a1628;border:1px solid #1e3a5f;border-radius:12px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative}
.player-card.team-a{border-color:#2563eb}
.player-card.team-b{border-color:#dc2626}
.player-avatar{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid #1e3a5f}
.avatar-placeholder{width:64px;height:64px;border-radius:50%;background:#1e3a5f;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#d4a843;font-family:'Playfair Display',serif;font-weight:700;border:2px solid #2a4a6f}
.player-name{font-size:0.85rem;font-weight:600;text-align:center;color:#e8dcc8}
.player-role{font-size:0.7rem;color:#7a9dbf}
.badge{padding:3px 8px;border-radius:10px;font-size:0.7rem;font-weight:600}
.badge-captain{background:#d4a843;color:#0a1628}
.scoreboard{background:#0f2040;border:2px solid #d4a843;border-radius:20px;padding:24px;text-align:center;margin-bottom:20px}
.score-big{font-family:'Playfair Display',serif;font-size:3rem;font-weight:900;color:#d4a843;line-height:1}
.score-sub{font-size:0.9rem;color:#7a9dbf;margin-top:4px}
.score-team{font-size:0.85rem;color:#b8cfe8;font-weight:600;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.over-count{font-size:1rem;color:#e8dcc8;margin-top:8px}
.ball-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.ball{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;border:2px solid transparent}
.ball-0{background:#1e3a5f;color:#7a9dbf;border-color:#2a4a6f}
.ball-1,.ball-2,.ball-3{background:#27ae60;color:#fff;border-color:#2ecc71}
.ball-4{background:#f39c12;color:#fff;border-color:#f1c40f}
.ball-6{background:#d4a843;color:#0a1628;border-color:#e8bc55}
.ball-wide{background:#8e44ad;color:#fff;border-color:#9b59b6}
.ball-noball{background:#e74c3c;color:#fff;border-color:#c0392b}
.ball-dot{background:#1e3a5f;color:#7a9dbf;border-color:#2a4a6f}
.ball-wk{background:#e74c3c;color:#fff;border-color:#c0392b}
.run-buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px 0}
.run-btn{padding:16px 8px;border-radius:12px;border:2px solid;font-size:1.1rem;font-weight:700;cursor:pointer;font-family:'Playfair Display',serif;transition:all 0.15s;background:transparent}
.run-btn:active{transform:scale(0.95)}
.run-0{border-color:#1e3a5f;color:#7a9dbf}.run-0:hover{background:#1e3a5f}
.run-1{border-color:#27ae60;color:#27ae60}.run-1:hover{background:#1a4a2e}
.run-2{border-color:#2980b9;color:#2980b9}.run-2:hover{background:#1a2a4a}
.run-3{border-color:#8e44ad;color:#8e44ad}.run-3:hover{background:#2a1a3a}
.run-4{border-color:#f39c12;color:#f39c12}.run-4:hover{background:#3a2a0a}
.run-5{border-color:#16a085;color:#16a085}.run-5:hover{background:#0a2a20}
.run-6{border-color:#d4a843;color:#d4a843}.run-6:hover{background:#2a1e0a}
.extra-buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0 16px}
.extra-btn{padding:12px;border-radius:10px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.9rem;transition:all 0.15s;border:2px solid}
.extra-btn:active{transform:scale(0.97)}
.wide-btn{border-color:#8e44ad;color:#8e44ad;background:transparent}.wide-btn:hover{background:#2a0a3a}
.noball-btn{border-color:#e74c3c;color:#e74c3c;background:transparent}.noball-btn:hover{background:#3a0a0a}
.wicket-btn{padding:12px;border-radius:10px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.9rem;transition:all 0.15s;border:2px solid #e74c3c;color:#e74c3c;background:transparent;width:100%}
.wicket-btn:hover{background:#3a0a0a}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1e3a5f;font-size:0.9rem}
.stat-row:last-child{border-bottom:none}
.stat-label{color:#7a9dbf}
.stat-val{font-weight:600;color:#e8dcc8}
.players-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
.team-section{margin-bottom:20px}
.team-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.team-dot{width:12px;height:12px;border-radius:50%}
.dot-a{background:#2563eb}
.dot-b{background:#dc2626}
.team-name{font-size:1rem;font-weight:600;color:#b8cfe8}
.select-btns{display:flex;gap:6px;margin-top:8px;width:100%}
.team-btn{flex:1;padding:5px;border-radius:6px;border:2px solid;font-size:0.7rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;background:transparent}
.team-btn.team-a{border-color:#2563eb;color:#2563eb}.team-btn.team-a.active,.team-btn.team-a:hover{background:#2563eb;color:#fff}
.team-btn.team-b{border-color:#dc2626;color:#dc2626}.team-btn.team-b.active,.team-btn.team-b:hover{background:#dc2626;color:#fff}
.captain-btn{padding:5px;border-radius:6px;border:2px solid #d4a843;font-size:0.7rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;color:#d4a843;background:transparent;width:100%;margin-top:4px;transition:all 0.15s}
.captain-btn:hover,.captain-btn.active{background:#d4a843;color:#0a1628}
.match-hist-card{background:#0a1628;border:1px solid #1e3a5f;border-radius:12px;padding:16px;margin-bottom:12px}
.match-hist-card h3{font-size:1rem;color:#d4a843;margin-bottom:8px}
.winner-badge{background:#d4a843;color:#0a1628;padding:4px 12px;border-radius:10px;font-size:0.8rem;font-weight:700;display:inline-block;margin-bottom:8px}
.vs-text{color:#d4a843;font-size:0.85rem;font-weight:700}
.notice{background:#1e3a5f;border-radius:10px;padding:12px 16px;font-size:0.85rem;color:#7a9dbf;text-align:center;margin-bottom:12px}
.photo-upload{width:80px;height:80px;border-radius:50%;border:2px dashed #2a4a6f;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#0a1628;overflow:hidden;flex-shrink:0}
.photo-upload:hover{border-color:#d4a843}
.photo-upload img{width:100%;height:100%;object-fit:cover}
.over-done-banner{background:#d4a843;color:#0a1628;padding:12px;border-radius:10px;text-align:center;font-weight:700;font-size:1rem;margin-bottom:12px}
.batting-stat{background:#0a1628;border:1px solid #1e3a5f;border-left:4px solid #2563eb;border-radius:10px;padding:12px;display:flex;align-items:center;gap:12px}
.batting-name{font-weight:600;font-size:0.9rem}
.batting-score{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:#d4a843}
.bowling-stat{background:#1a0f0f;border:1px solid #1e3a5f;border-left:4px solid #e74c3c;border-radius:10px;padding:12px;display:flex;align-items:center;gap:12px}
.section-divider{border:none;border-top:1px solid #1e3a5f;margin:16px 0}
.alert-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:999}
.alert-box{background:#0f2040;border:2px solid #d4a843;border-radius:20px;padding:32px;max-width:400px;width:90%;text-align:center}
.alert-box h2{color:#d4a843;margin-bottom:16px}
.alert-box p{color:#b8cfe8;margin-bottom:24px;line-height:1.6}
.alert-overlay{padding:12px;overflow-y:auto}
.alert-box{max-height:92vh;overflow-y:auto}
.stat-row{gap:10px}
.stat-label{min-width:0;overflow-wrap:anywhere}
.stat-val{white-space:nowrap;flex-shrink:0}

/* ---- Phone screens ---- */
@media (max-width:600px){
  .app{padding:10px}
  .logo{padding:14px 0 10px;margin-bottom:14px}
  .logo h1{font-size:1.6rem}
  .tabs{gap:6px;margin-bottom:14px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
  .tab{padding:7px 12px;font-size:0.8rem;white-space:nowrap;flex:0 0 auto}
  .card{padding:14px;border-radius:14px;margin-bottom:12px}
  .input{font-size:16px}      /* >=16px stops iOS auto-zoom on focus */
  select.input{font-size:16px}
  .score-big{font-size:2.4rem}
  .scoreboard{padding:18px;border-radius:16px}
  .run-buttons{gap:6px}
  .run-btn{padding:14px 4px;font-size:1rem}
  .btn-big{padding:14px 18px;font-size:1rem}
  .ball{width:30px;height:30px;font-size:0.7rem}
  .players-list{grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:10px}
  .alert-box{padding:20px;border-radius:16px}
  .alert-box h2{font-size:1.2rem}
}
/* Very small phones: stack two-column form fields */
@media (max-width:380px){
  .grid2{grid-template-columns:1fr}
  .run-btn{font-size:0.92rem;padding:12px 2px}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="crictrack-engine.js"></script>
<textarea id="app-source" hidden>
const {useState,useEffect,useRef}=React;

function saveLS(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch{}}
function loadLS(key,def){try{const r=localStorage.getItem(key);return r?JSON.parse(r):def;}catch{return def;}}

// ===== Backup configuration =====
// To enable the "Upload to Google Drive" button, create an OAuth client ID in
// Google Cloud (type: Web application) with your hosted site's URL added as an
// Authorized JavaScript origin, then paste the client ID below. Leave it empty
// to use only the Download/Restore file backup (which always works).
const GDRIVE_CLIENT_ID='';
const GDRIVE_FILE_NAME='crictrack-backup.json';
// Everything the app stores. The backup bundles exactly these keys.
const LS_KEYS=['ct_players','ct_teamA','ct_teamB','ct_capA','ct_capB','ct_overs','ct_solo','ct_club','ct_match','ct_history'];

function buildBackup(){
  const data={};
  LS_KEYS.forEach(k=>{data[k]=loadLS(k,null);});
  return {app:'CricTrack',version:1,savedAt:new Date().toISOString(),data};
}
function restoreBackup(obj){
  if(!obj||obj.app!=='CricTrack'||!obj.data)throw new Error('This file is not a CricTrack backup.');
  LS_KEYS.forEach(k=>{if(k in obj.data && obj.data[k]!==null)saveLS(k,obj.data[k]);});
}

function App(){
  const [tab,setTab]=useState('setup');
  const [players,setPlayers]=useState(()=>loadLS('ct_players',[]));
  const [teamAName,setTeamAName]=useState(()=>loadLS('ct_teamA','Team Alpha'));
  const [teamBName,setTeamBName]=useState(()=>loadLS('ct_teamB','Team Beta'));
  const [captainA,setCaptainA]=useState(()=>loadLS('ct_capA',null));
  const [captainB,setCaptainB]=useState(()=>loadLS('ct_capB',null));
  const [overs,setOvers]=useState(()=>loadLS('ct_overs',6));
  const [soloLastMan,setSoloLastMan]=useState(()=>loadLS('ct_solo',false));
  const [clubName,setClubName]=useState(()=>loadLS('ct_club',''));
  const [match,setMatch]=useState(()=>loadLS('ct_match',null));
  const [matchHistory,setMatchHistory]=useState(()=>loadLS('ct_history',[]));
  const [addPlayer,setAddPlayer]=useState(false);
  const [newName,setNewName]=useState('');
  const [newRole,setNewRole]=useState('All-rounder');
  const [newPhoto,setNewPhoto]=useState(null);
  const [alert,setAlert]=useState(null);
  const [undoStack,setUndoStack]=useState([]);
  const [cropSrc,setCropSrc]=useState(null);
  const photoRef=useRef();

  useEffect(()=>saveLS('ct_players',players),[players]);
  useEffect(()=>saveLS('ct_teamA',teamAName),[teamAName]);
  useEffect(()=>saveLS('ct_teamB',teamBName),[teamBName]);
  useEffect(()=>saveLS('ct_capA',captainA),[captainA]);
  useEffect(()=>saveLS('ct_capB',captainB),[captainB]);
  useEffect(()=>saveLS('ct_overs',overs),[overs]);
  useEffect(()=>saveLS('ct_solo',soloLastMan),[soloLastMan]);
  useEffect(()=>saveLS('ct_club',clubName),[clubName]);
  useEffect(()=>saveLS('ct_match',match),[match]);
  useEffect(()=>saveLS('ct_history',matchHistory),[matchHistory]);

  const handlePhoto=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setCropSrc(ev.target.result);r.readAsDataURL(f);e.target.value='';};

  const savePlayer=()=>{
    if(!newName.trim())return;
    setPlayers(prev=>[...prev,{id:Date.now(),name:newName.trim(),role:newRole,photo:newPhoto,team:null}]);
    setNewName('');setNewRole('All-rounder');setNewPhoto(null);setAddPlayer(false);
  };

  const removePlayer=id=>setPlayers(prev=>prev.filter(p=>p.id!==id));
  const assignTeam=(id,team)=>setPlayers(prev=>prev.map(p=>p.id===id?{...p,team}:p));

  const startMatch=()=>{
    const teamA=players.filter(p=>p.team==='A');
    const teamB=players.filter(p=>p.team==='B');
    if(teamA.length<2||teamB.length<2){
      setAlert({title:'Not enough players',msg:'Each team needs at least 2 players.',ok:()=>setAlert(null)});return;
    }
    setAlert({title:'Toss Time!',msg:'Who won the toss and chose to bat first?',choices:[
      {label:teamAName,val:'A'},{label:teamBName,val:'B'}
    ],ok:(v)=>{
      const m={
        id:Date.now(),
        date:new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}),
        teamA:{name:teamAName,players:[...teamA],captain:captainA,score:0,wickets:0,overs:0,balls:0,extras:0},
        teamB:{name:teamBName,players:[...teamB],captain:captainB,score:0,wickets:0,overs:0,balls:0,extras:0},
        maxOvers:overs,soloLastMan,clubName:clubName.trim(),innings:1,battingTeam:v,bowlingTeam:v==='A'?'B':'A',
        striker:null,nonStriker:null,currentBowler:null,
        batsmen:{},bowlers:{},ballHistory:[],currentOverBalls:[],status:'live',winner:null
      };
      setMatch(m);setTab('match');setAlert(null);
    }});
  };

  // Every match-changing action goes through applyMatch so it can be undone.
  const applyMatch=next=>{setUndoStack(s=>[...s,match].slice(-60));setMatch(next);};

  const undo=()=>{
    if(!undoStack.length)return;
    const prev=undoStack[undoStack.length-1];
    // If we're undoing the last ball of a finished match, also drop the
    // history record that ball created.
    if(match&&match.status==='done')setMatchHistory(h=>h.filter(x=>x.id!==match.id));
    setMatch(prev);
    setUndoStack(s=>s.slice(0,-1));
  };

  const selectBatsmen=(m,striker,nonStriker)=>applyMatch(CricEngine.selectBatsmen(m,striker,nonStriker));
  const selectBowler=(m,bowlerId)=>applyMatch(CricEngine.selectBowler(m,bowlerId));

  // Send a batsman/bowler back to the selection screen. For batsmen we only
  // allow it before they've faced a ball (otherwise use Undo) and we clean up
  // the unused stat entry so no "ghost" batsman is left behind.
  const changeBowler=()=>{if(match)applyMatch({...match,currentBowler:null});};
  const changeBatsman=which=>{
    if(!match)return;
    const id=match[which];
    const next={...match,[which]:null};
    if(id&&match.batsmen[id]&&match.batsmen[id].balls===0){
      const nb={...match.batsmen};delete nb[id];next.batsmen=nb;
    }
    applyMatch(next);
  };

  const recordBall=(type,runs=0,dismissal=null)=>{
    if(!match||match.status==='done')return;
    const {match:next,event}=CricEngine.recordBall(match,type,runs,dismissal);
    if(!next.startTime)next.startTime=Date.now();   // stamped on the very first delivery
    if(event&&event.type==='inningsBreak'){
      // Defer applying the 2nd innings until the scorer taps Continue.
      setAlert({title:event.title,msg:event.msg,ok:()=>{applyMatch(next);setAlert(null);}});
      return;
    }
    if(event&&event.type==='matchOver'){
      next.endTime=Date.now();                       // stamped when the match finishes
      applyMatch(next);
      setMatchHistory(prev=>[next,...prev]);
      setAlert({title:event.title,msg:event.msg,ok:()=>{setTab('history');setAlert(null);}});
      return;
    }
    applyMatch(next);
    if(event&&event.type==='overDone'){
      setAlert({title:event.title,msg:event.msg,ok:()=>setAlert(null)});
    }
  };

  const getPlayerName=id=>{
    const all=[...players,...(match?[...match.teamA.players,...match.teamB.players]:[])];
    return (all.find(p=>String(p.id)===String(id))||{name:'?'}).name;
  };
  const getPlayerPhoto=id=>{
    const all=[...players,...(match?[...match.teamA.players,...match.teamB.players]:[])];
    return (all.find(p=>String(p.id)===String(id))||{}).photo||null;
  };

  return(
    <div className="app">
      <div className="logo"><h1>🏏 CricTrack</h1><p>Match Manager & Stats</p></div>
      <div className="tabs">
        {[['setup','⚙ Setup'],['players','👤 Players'],['teams','🏟 Teams'],['match','🏏 Live'],['history','📋 History'],['backup','💾 Backup']].map(([id,label])=>(
          <button key={id} className={`tab${tab===id?' active':''}`} onClick={()=>setTab(id)}>{label}</button>
        ))}
      </div>

      {tab==='setup'&&<SetupTab teamAName={teamAName} teamBName={teamBName} setTeamAName={setTeamAName} setTeamBName={setTeamBName} overs={overs} setOvers={setOvers} soloLastMan={soloLastMan} setSoloLastMan={setSoloLastMan} clubName={clubName} setClubName={setClubName} players={players} onStart={startMatch}/>}
      {tab==='players'&&<PlayersTab players={players} addPlayer={addPlayer} setAddPlayer={setAddPlayer} newName={newName} setNewName={setNewName} newRole={newRole} setNewRole={setNewRole} newPhoto={newPhoto} setNewPhoto={setNewPhoto} photoRef={photoRef} handlePhoto={handlePhoto} savePlayer={savePlayer} removePlayer={removePlayer} cropSrc={cropSrc} setCropSrc={setCropSrc}/>}
      {tab==='teams'&&<TeamsTab players={players} teamAName={teamAName} teamBName={teamBName} captainA={captainA} captainB={captainB} setCaptainA={setCaptainA} setCaptainB={setCaptainB} assignTeam={assignTeam}/>}

function PhotoCropper({src,onCancel,onCrop}){
  // Preview shrinks to fit narrow phones; output stays high-res regardless.
  const S=Math.min(260,(typeof window!=='undefined'?window.innerWidth:360)-96), OUT=400;
  const [zoom,setZoom]=useState(1);
  const [px,setPx]=useState(0.5);
  const [py,setPy]=useState(0.5);
  const [dim,setDim]=useState(null);
  const dragRef=useRef(null);
  useEffect(()=>{const img=new Image();img.onload=()=>setDim({w:img.naturalWidth,h:img.naturalHeight});img.src=src;},[src]);

  // Drag the photo to reposition it within the circle (works on mouse and touch).
  const onDown=e=>{dragRef.current={x:e.clientX,y:e.clientY,px,py};if(e.currentTarget.setPointerCapture)e.currentTarget.setPointerCapture(e.pointerId);};
  const onMove=e=>{
    if(!dragRef.current)return;
    const l=layout(S), slackX=l.drawW-S, slackY=l.drawH-S;
    let nx=dragRef.current.px, ny=dragRef.current.py;
    if(slackX>0)nx=Math.min(1,Math.max(0,dragRef.current.px-(e.clientX-dragRef.current.x)/slackX));
    if(slackY>0)ny=Math.min(1,Math.max(0,dragRef.current.py-(e.clientY-dragRef.current.y)/slackY));
    setPx(nx);setPy(ny);
  };
  const onUp=()=>{dragRef.current=null;};

  // Map the chosen zoom/pan to image draw rect for a given output square size.
  const layout=size=>{
    if(!dim)return{drawW:size,drawH:size,dx:0,dy:0};
    const base=Math.max(size/dim.w,size/dim.h);
    const scale=base*zoom;
    const drawW=dim.w*scale, drawH=dim.h*scale;
    return{drawW,drawH,dx:-(drawW-size)*px,dy:-(drawH-size)*py};
  };
  const p=layout(S);

  const doCrop=()=>{
    const c=document.createElement('canvas');c.width=OUT;c.height=OUT;
    const ctx=c.getContext('2d');
    const img=new Image();
    img.onload=()=>{const l=layout(OUT);ctx.drawImage(img,l.dx,l.dy,l.drawW,l.drawH);onCrop(c.toDataURL('image/jpeg',0.85));};
    img.src=src;
  };

  return(
    <div className="alert-overlay" onClick={e=>{if(e.target.classList.contains('alert-overlay'))onCancel();}}>
      <div className="alert-box" style={{maxWidth:'340px'}}>
        <h2>Crop Photo</h2>
        <div onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp} onPointerLeave={onUp}
          style={{width:S,height:S,borderRadius:'50%',overflow:'hidden',margin:'0 auto 10px',position:'relative',background:'#0a1628',border:'2px solid #d4a843',cursor:dragRef.current?'grabbing':'grab',touchAction:'none'}}>
          <img src={src} alt="" draggable={false} style={{position:'absolute',left:p.dx,top:p.dy,width:p.drawW,height:p.drawH,maxWidth:'none',userSelect:'none',pointerEvents:'none'}}/>
        </div>
        <div style={{fontSize:'0.75rem',color:'#7a9dbf',textAlign:'center',marginBottom:'12px'}}>Drag the photo to reposition it, then zoom if needed.</div>
        <div className="field"><label className="label">Zoom</label>
          <input type="range" min={1} max={3} step={0.01} value={zoom} onChange={e=>setZoom(Number(e.target.value))} style={{width:'100%'}}/></div>
        <div style={{display:'flex',gap:'10px',justifyContent:'center',marginTop:'8px'}}>
          <button className="btn btn-gold btn-big" onClick={doCrop}>Use Photo</button>
          <button className="btn btn-outline btn-big" onClick={onCancel}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

function MatchTab({match,selectBatsmen,selectBowler,recordBall,getPlayerName,getPlayerPhoto,undo,canUndo,changeBowler,changeBatsman}){
  const [wkt,setWkt]=useState(null);
  const [extra,setExtra]=useState(null);
  const [celeb,setCeleb]=useState(false);
  const [openBowler,setOpenBowler]=useState(null);
  if(!match)return<div className="card"><div className="notice">No active match. Go to Setup and start a match!</div></div>;
  const bt=match.battingTeam;
  const bwt=match.bowlingTeam;
  const battingTeam=match[`team${bt}`];
  const bowlingTeam=match[`team${bwt}`];
  const target=match.innings===2?match[`team${bwt}`].score+1:null;
  const goodBalls=match.currentOverBalls.filter(b=>!b.isExtra).length;
  const strikerData=match.striker?match.batsmen[match.striker]:null;
  const nonStrikerData=match.nonStriker?match.batsmen[match.nonStriker]:null;
  const bowlerData=match.currentBowler?match.bowlers[match.currentBowler]:null;

  const availBatsmen=battingTeam.players.filter(p=>{
    const bs=match.batsmen[p.id];
    return (!bs||!bs.out)&&p.id!==match.striker&&p.id!==match.nonStriker;
  });
  // A bowler can't bowl two overs in a row, so exclude whoever bowled the last
  // over. Fall back to everyone if that would leave nobody (tiny teams).
  const bowlerCandidates=bowlingTeam.players.filter(p=>String(p.id)!==String(match.lastBowler));
  const availBowlers=bowlerCandidates.length?bowlerCandidates:bowlingTeam.players;
  // Gully "last man stands": when only one batsman is left, he bats alone (no non-striker).
  const aliveBatsmen=battingTeam.players.filter(p=>{const bs=match.batsmen[p.id];return !bs||!bs.out;}).length;
  const battingAlone=!!match.soloLastMan&&aliveBatsmen<=1;

  const getBallClass=b=>{
    if(b.type==='wide')return 'ball-wide';
    if(b.type==='noball')return 'ball-noball';
    if(b.type==='wicket')return 'ball-dot';
    if(b.runs===4)return 'ball-4';
    if(b.runs===6)return 'ball-6';
    if(b.runs===0)return 'ball-dot';
    return 'ball-1';
  };
  const getBallLabel=b=>{
    if(b.type==='wide')return b.wicket?'Wd+W':'Wd';
    if(b.type==='noball')return b.wicket?'NB+W':'NB';
    if(b.type==='wicket')return 'W';
    return b.runs;
  };

  const MiniAvatar=({id,size=40})=>{
    const photo=getPlayerPhoto(id);
    const name=getPlayerName(id);
    return photo
      ?<img src={photo} alt={name} style={{width:size,height:size,borderRadius:'50%',objectFit:'cover',border:'2px solid #1e3a5f',flexShrink:0}}/>
      :<div style={{width:size,height:size,borderRadius:'50%',background:'#1e3a5f',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.9rem',color:'#d4a843',fontWeight:700,flexShrink:0}}>{name[0]}</div>;
  };

  return(
    <div>
      {match.status==='done'&&<div className="over-done-banner">{match.clubName?`${match.clubName} — `:''}🏆 Match Complete — Winner: {match.winner}</div>}
      {match.status==='done'&&<button className="btn btn-gold btn-big" style={{width:'100%',marginBottom:'16px'}} onClick={()=>setCeleb(true)}>🎉 Celebration image — Share result</button>}
      {celeb&&<CelebrationModal match={match} onClose={()=>setCeleb(false)}/>}

      <div className="scoreboard">
        {match.clubName&&<div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:'1.25rem',color:'#d4a843',marginBottom:'8px',letterSpacing:'0.5px'}}>{match.clubName}</div>}
        <div className="score-team">{battingTeam.name} — {match.innings===1?'1st Innings':`2nd Innings (Target: ${target})`}</div>
        <div className="score-big">{battingTeam.score}/{battingTeam.wickets}</div>
        <div className="score-sub">Overs: {battingTeam.overs}.{goodBalls} / {match.maxOvers} &nbsp;|&nbsp; Extras: {battingTeam.extras}</div>
        {match.innings===2&&match.status==='live'&&(()=>{
          const need=target-battingTeam.score;
          const ballsLeft=match.maxOvers*6-(battingTeam.overs*6+goodBalls);
          const rrr=ballsLeft>0?(need/(ballsLeft/6)).toFixed(2):'-';
          return(
            <div style={{marginTop:'10px',padding:'8px 12px',background:'#0a1628',border:'1px solid #d4a843',borderRadius:'10px',display:'inline-block'}}>
              <div style={{fontSize:'1rem',color:'#e8dcc8',fontWeight:600}}>
                Need <span style={{color:'#d4a843',fontWeight:700}}>{need>0?need:0}</span> run{need===1?'':'s'} from <span style={{color:'#d4a843',fontWeight:700}}>{ballsLeft}</span> ball{ballsLeft===1?'':'s'}
              </div>
              <div style={{fontSize:'0.78rem',color:'#7a9dbf',marginTop:'2px'}}>Required run rate: {rrr}</div>
            </div>
          );
        })()}
        <div className="ball-row">
          {match.currentOverBalls.map((b,i)=><div key={i} className={`ball ${getBallClass(b)}`}>{getBallLabel(b)}</div>)}
          {Array(Math.max(0,6-goodBalls)).fill(0).map((_,i)=><div key={'e'+i} className="ball ball-0">·</div>)}
        </div>
      </div>

      <button className="btn btn-outline" style={{width:'100%',marginBottom:'12px',opacity:canUndo?1:0.4,cursor:canUndo?'pointer':'not-allowed'}} disabled={!canUndo} onClick={undo}>↶ Undo last action</button>

      <div className="grid2" style={{marginBottom:'12px'}}>
        <div className="batting-stat">
          {match.striker?<MiniAvatar id={match.striker}/>:<div style={{width:40,height:40,borderRadius:'50%',background:'#1e3a5f',flexShrink:0}}/>}
          <div>
            <div className="batting-name">{match.striker?getPlayerName(match.striker):'—'} <span style={{color:'#d4a843'}}>★</span></div>
            <div className="batting-score">{strikerData?`${strikerData.runs}(${strikerData.balls})`:'0(0)'}</div>
            <div style={{fontSize:'0.7rem',color:'#7a9dbf'}}>{strikerData?`4s:${strikerData.fours} 6s:${strikerData.sixes}`:''}</div>
          </div>
          {match.status==='live'&&match.striker&&strikerData&&strikerData.balls===0&&<button className="btn btn-sm btn-outline" style={{marginLeft:'auto'}} onClick={()=>changeBatsman('striker')}>Change</button>}
        </div>
        <div className="batting-stat">
          {match.nonStriker?<MiniAvatar id={match.nonStriker}/>:<div style={{width:40,height:40,borderRadius:'50%',background:'#1e3a5f',flexShrink:0}}/>}
          <div>
            <div className="batting-name">{match.nonStriker?getPlayerName(match.nonStriker):(battingAlone?'Batting alone':'—')}</div>
            <div className="batting-score">{match.nonStriker?(nonStrikerData?`${nonStrikerData.runs}(${nonStrikerData.balls})`:'0(0)'):(battingAlone?'gully rule':'')}</div>
            <div style={{fontSize:'0.7rem',color:'#7a9dbf'}}>{match.nonStriker&&nonStrikerData?`4s:${nonStrikerData.fours} 6s:${nonStrikerData.sixes}`:''}</div>
          </div>
          {match.status==='live'&&match.nonStriker&&nonStrikerData&&nonStrikerData.balls===0&&<button className="btn btn-sm btn-outline" style={{marginLeft:'auto'}} onClick={()=>changeBatsman('nonStriker')}>Change</button>}
        </div>
      </div>

      <div className="bowling-stat" style={{marginBottom:'12px'}}>
        {match.currentBowler?<MiniAvatar id={match.currentBowler}/>:<div style={{width:40,height:40,borderRadius:'50%',background:'#1e3a5f',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1rem',flexShrink:0}}>🎯</div>}
        <div>
          <div className="batting-name">{match.currentBowler?getPlayerName(match.currentBowler):'Select Bowler'}</div>
          <div style={{fontSize:'0.85rem',color:'#7a9dbf'}}>{bowlerData?`${bowlerData.overs}.${bowlerData.balls} ov | ${bowlerData.runs} runs | ${bowlerData.wickets}W`:''}</div>
        </div>
        {match.status==='live'&&match.currentBowler&&<button className="btn btn-sm btn-outline" style={{marginLeft:'auto'}} onClick={changeBowler}>Change</button>}
      </div>

      {(!match.striker||(!match.nonStriker&&!battingAlone))&&match.status==='live'&&(
        <div className="card" style={{borderColor:'#d4a843'}}>
          <h3>Select {!match.striker?'Striker ★':'Non-Striker'}</h3>
          <div className="players-list">
            {availBatsmen.map(p=>(
              <div key={p.id} className="player-card" style={{cursor:'pointer'}} onClick={()=>{
                if(!match.striker)selectBatsmen(match,p.id,match.nonStriker);
                else selectBatsmen(match,match.striker,p.id);
              }}>
                {p.photo?<img src={p.photo} alt={p.name} className="player-avatar"/>:<div className="avatar-placeholder">{p.name[0]}</div>}
                <div className="player-name">{p.name}</div>
                <div style={{fontSize:'0.7rem',color:'#d4a843',fontWeight:600}}>Tap to select</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {!match.currentBowler&&match.status==='live'&&(
        <div className="card" style={{borderColor:'#e74c3c'}}>
          <h3>Select Bowler</h3>
          {match.lastBowler&&<div className="notice" style={{marginBottom:'12px'}}>{getPlayerName(match.lastBowler)} bowled the last over and can't bowl again now.</div>}
          <div className="players-list">
            {availBowlers.map(p=>(
              <div key={p.id} className="player-card" style={{cursor:'pointer'}} onClick={()=>selectBowler(match,p.id)}>
                {p.photo?<img src={p.photo} alt={p.name} className="player-avatar"/>:<div className="avatar-placeholder">{p.name[0]}</div>}
                <div className="player-name">{p.name}</div>
                <div style={{fontSize:'0.7rem',color:'#e74c3c',fontWeight:600}}>Tap to select</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {match.striker&&(match.nonStriker||battingAlone)&&match.currentBowler&&match.status==='live'&&(
        <div className="card">
          <h3>Record Ball</h3>
          <div className="run-buttons">
            {[0,1,2,3,4,5,6].map(r=>(
              <button key={r} className={`run-btn run-${r}`} onClick={()=>recordBall('run',r)}>
                {r===0?'Dot':r===4?'FOUR':r===6?'SIX':r}
              </button>
            ))}
          </div>
          <div className="extra-buttons">
            <button className="extra-btn wide-btn" onClick={()=>setExtra({kind:'wide',runs:0,dType:null,fielder:null,outBatsman:match.striker})}>Wide</button>
            <button className="extra-btn noball-btn" onClick={()=>setExtra({kind:'noball',runs:0,dType:null,fielder:null,outBatsman:match.striker})}>No Ball</button>
          </div>
          <button className="wicket-btn" onClick={()=>setWkt({type:null,fielder:null,outBatsman:match.striker})}>🚨 WICKET — Batsman Out!</button>
        </div>
      )}

      <div className="card">
        <h2>Scorecard</h2>
        <h3 style={{marginBottom:'10px'}}>Batting — {battingTeam.name}</h3>
        {battingTeam.players.map(p=>{
          const bs=match.batsmen[p.id]||match.batsmen[String(p.id)];
          if(!bs)return null;
          return(
            <div key={p.id} className="stat-row">
              <span className="stat-label">{String(p.id)===String(match.striker)?'★ ':''}{getPlayerName(p.id)} <span style={{color:bs.out?'#e74c3c':'#27ae60',fontSize:'0.75rem'}}>({bs.out?(bs.howOut||'out'):'not out'})</span></span>
              <span className="stat-val">{bs.runs}({bs.balls}b) {bs.fours?`| ${bs.fours}×4`:''} {bs.sixes?`| ${bs.sixes}×6`:''}</span>
            </div>
          );
        })}
        <hr className="section-divider"/>
        <h3 style={{marginBottom:'10px'}}>Bowling — {bowlingTeam.name}</h3>
        {Object.entries(match.bowlers).filter(([id])=>bowlingTeam.players.some(p=>String(p.id)===String(id))).map(([id,b])=>(
          <div key={id}>
            <div className="stat-row" style={{cursor:'pointer'}} onClick={()=>setOpenBowler(openBowler===id?null:id)}>
              <span className="stat-label">{getPlayerName(id)} <span style={{color:'#7a9dbf',fontSize:'0.7rem'}}>{openBowler===id?'▲ hide balls':'▾ balls'}</span></span>
              <span className="stat-val">{b.overs}.{b.balls}ov | {b.runs}R | {b.wickets}W | Wd:{b.wides} NB:{b.noBalls}</span>
            </div>
            {openBowler===id&&<BowlerBalls match={match} bowlerId={id}/>}
          </div>
        ))}
      </div>

      {wkt&&(
        <div className="alert-overlay" onClick={e=>{if(e.target.classList.contains('alert-overlay'))setWkt(null);}}>
          <div className="alert-box" style={{maxWidth:'460px'}}>
            <h2>🚨 How was the batsman out?</h2>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',margin:'8px 0 16px'}}>
              {[['bowled','Bowled'],['lbw','LBW'],['caught','Caught'],['stumped','Stumped'],['runout','Run Out'],['hitwicket','Hit Wicket'],['boxout','BOX Out']].map(([v,l])=>(
                <button key={v} className={`btn ${wkt.type===v?'btn-gold':'btn-outline'}`} onClick={()=>setWkt({...wkt,type:v,fielder:null,outBatsman:match.striker})}>{l}</button>
              ))}
            </div>
            {wkt.type==='runout'&&(
              <div style={{marginBottom:'14px'}}>
                <label className="label">Who is out?</label>
                <div style={{display:'flex',gap:'8px',justifyContent:'center',flexWrap:'wrap'}}>
                  {match.striker&&<button className={`btn btn-sm ${String(wkt.outBatsman)===String(match.striker)?'btn-gold':'btn-outline'}`} onClick={()=>setWkt({...wkt,outBatsman:match.striker})}>★ {getPlayerName(match.striker)}</button>}
                  {match.nonStriker&&<button className={`btn btn-sm ${String(wkt.outBatsman)===String(match.nonStriker)?'btn-gold':'btn-outline'}`} onClick={()=>setWkt({...wkt,outBatsman:match.nonStriker})}>{getPlayerName(match.nonStriker)}</button>}
                </div>
              </div>
            )}
            {(wkt.type==='caught'||wkt.type==='stumped'||wkt.type==='runout')&&(
              <div style={{marginBottom:'14px'}}>
                <label className="label">{wkt.type==='caught'?'Caught by':wkt.type==='stumped'?'Stumped by':'Fielder (run out by)'}</label>
                <div style={{display:'flex',flexWrap:'wrap',gap:'6px',justifyContent:'center'}}>
                  {bowlingTeam.players.map(p=>(
                    <button key={p.id} className={`btn btn-sm ${String(wkt.fielder)===String(p.id)?'btn-gold':'btn-outline'}`} onClick={()=>setWkt({...wkt,fielder:p.id})}>{p.name}</button>
                  ))}
                </div>
              </div>
            )}
            {(wkt.type==='caught'||wkt.type==='runout')&&(
              <div style={{marginBottom:'14px'}}>
                <label className="label">Did the batsmen cross while running?</label>
                <div style={{display:'flex',gap:'8px',justifyContent:'center'}}>
                  <button className={`btn btn-sm ${!wkt.crossed?'btn-gold':'btn-outline'}`} onClick={()=>setWkt({...wkt,crossed:false})}>No</button>
                  <button className={`btn btn-sm ${wkt.crossed?'btn-gold':'btn-outline'}`} onClick={()=>setWkt({...wkt,crossed:true})}>Yes, crossed</button>
                </div>
                <div style={{fontSize:'0.72rem',color:'#7a9dbf',marginTop:'6px',textAlign:'center'}}>If they crossed, the not-out batsman keeps strike.</div>
              </div>
            )}
            {(()=>{
              const needsFielder=wkt.type==='caught'||wkt.type==='stumped'||wkt.type==='runout';
              const canConfirm=!!wkt.type&&(!needsFielder||!!wkt.fielder);
              return(
                <div style={{display:'flex',gap:'10px',justifyContent:'center',marginTop:'8px'}}>
                  <button className="btn btn-danger btn-big" style={{opacity:canConfirm?1:0.4,cursor:canConfirm?'pointer':'not-allowed'}} disabled={!canConfirm} onClick={()=>{recordBall('wicket',0,{type:wkt.type,fielder:wkt.fielder,outBatsman:wkt.outBatsman,crossed:!!wkt.crossed});setWkt(null);}}>Confirm Out</button>
                  <button className="btn btn-outline btn-big" onClick={()=>setWkt(null)}>Cancel</button>
                </div>
              );
            })()}
          </div>
        </div>
      )}

      {extra&&(
        <div className="alert-overlay" onClick={e=>{if(e.target.classList.contains('alert-overlay'))setExtra(null);}}>
          <div className="alert-box" style={{maxWidth:'460px'}}>
            <h2>{extra.kind==='noball'?'No Ball (+1)':'Wide (+1)'}</h2>
            <label className="label">{extra.kind==='noball'?'Runs scored off the bat':'Extra runs taken (byes)'}</label>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px',margin:'8px 0 16px'}}>
              {(extra.kind==='noball'?[0,1,2,3,4,6]:[0,1,2,3,4]).map(r=>(
                <button key={r} className={`btn ${extra.runs===r?'btn-gold':'btn-outline'}`} onClick={()=>setExtra({...extra,runs:r})}>{r}</button>
              ))}
            </div>
            <label className="label">Wicket on this ball? (optional)</label>
            <div style={{display:'flex',gap:'8px',flexWrap:'wrap',margin:'8px 0 14px'}}>
              <button className={`btn btn-sm ${!extra.dType?'btn-gold':'btn-outline'}`} onClick={()=>setExtra({...extra,dType:null,fielder:null})}>No wicket</button>
              <button className={`btn btn-sm ${extra.dType==='runout'?'btn-gold':'btn-outline'}`} onClick={()=>setExtra({...extra,dType:'runout',fielder:null,outBatsman:match.striker})}>Run Out</button>
              <button className={`btn btn-sm ${extra.dType==='boxout'?'btn-gold':'btn-outline'}`} onClick={()=>setExtra({...extra,dType:'boxout',fielder:null,outBatsman:match.striker})}>BOX Out</button>
              {extra.kind==='wide'&&<button className={`btn btn-sm ${extra.dType==='stumped'?'btn-gold':'btn-outline'}`} onClick={()=>setExtra({...extra,dType:'stumped',fielder:null,outBatsman:match.striker})}>Stumped</button>}
            </div>
            {extra.dType==='runout'&&(
              <div style={{marginBottom:'14px'}}>
                <label className="label">Who is out?</label>
                <div style={{display:'flex',gap:'8px',justifyContent:'center',flexWrap:'wrap'}}>
                  {match.striker&&<button className={`btn btn-sm ${String(extra.outBatsman)===String(match.striker)?'btn-gold':'btn-outline'}`} onClick={()=>setExtra({...extra,outBatsman:match.striker})}>★ {getPlayerName(match.striker)}</button>}
                  {match.nonStriker&&<button className={`btn btn-sm ${String(extra.outBatsman)===String(match.nonStriker)?'btn-gold':'btn-outline'}`} onClick={()=>setExtra({...extra,outBatsman:match.nonStriker})}>{getPlayerName(match.nonStriker)}</button>}
                </div>
              </div>
            )}
            {(extra.dType==='runout'||extra.dType==='stumped')&&(
              <div style={{marginBottom:'14px'}}>
                <label className="label">{extra.dType==='stumped'?'Stumped by':'Fielder (run out by)'}</label>
                <div style={{display:'flex',flexWrap:'wrap',gap:'6px',justifyContent:'center'}}>
                  {bowlingTeam.players.map(p=>(
                    <button key={p.id} className={`btn btn-sm ${String(extra.fielder)===String(p.id)?'btn-gold':'btn-outline'}`} onClick={()=>setExtra({...extra,fielder:p.id})}>{p.name}</button>
                  ))}
                </div>
              </div>
            )}
            {extra.dType==='runout'&&(
              <div style={{marginBottom:'14px'}}>
                <label className="label">Did the batsmen cross while running?</label>
                <div style={{display:'flex',gap:'8px',justifyContent:'center'}}>
                  <button className={`btn btn-sm ${!extra.crossed?'btn-gold':'btn-outline'}`} onClick={()=>setExtra({...extra,crossed:false})}>No</button>
                  <button className={`btn btn-sm ${extra.crossed?'btn-gold':'btn-outline'}`} onClick={()=>setExtra({...extra,crossed:true})}>Yes, crossed</button>
                </div>
              </div>
            )}
            {(()=>{
              const canConfirm=!extra.dType||extra.dType==='boxout'||!!extra.fielder;
              return(
                <div style={{display:'flex',gap:'10px',justifyContent:'center',marginTop:'8px'}}>
                  <button className="btn btn-gold btn-big" style={{opacity:canConfirm?1:0.4,cursor:canConfirm?'pointer':'not-allowed'}} disabled={!canConfirm}
                    onClick={()=>{
                      const dismissal=extra.dType?{type:extra.dType,fielder:extra.fielder,outBatsman:extra.dType==='stumped'||extra.dType==='boxout'?match.striker:extra.outBatsman,crossed:!!extra.crossed}:null;
                      recordBall(extra.kind,extra.runs,dismissal);setExtra(null);
                    }}>Confirm</button>
                  <button className="btn btn-outline btn-big" onClick={()=>setExtra(null)}>Cancel</button>
                </div>
              );
            })()}
          </div>
        </div>
      )}
    </div>
  );
}

function HistoryTab({matchHistory}){

  return(

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:'10px',flexWrap:'wrap',marginBottom:'16px'}}>
        <h2 style={{color:'#d4a843',margin:0,fontFamily:"'Playfair Display',serif"}}>Match History ({matchHistory.length})</h2>

      {matchHistory.map((m,i)=>(
        <div key={m.id||i} className="match-hist-card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:'8px'}}>
            <div>
              {m.clubName&&<div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:'1.05rem',color:'#d4a843',marginBottom:'2px'}}>{m.clubName}</div>}
              <div style={{fontSize:'0.75rem',color:'#7a9dbf',marginBottom:'4px'}}>{m.date} &nbsp;|&nbsp; {m.maxOvers} overs</div>
              {(m.startTime||m.endTime)&&(
                <div style={{fontSize:'0.72rem',color:'#7a9dbf',marginBottom:'4px'}}>
                  {m.startTime?`Start ${new Date(m.startTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`:''}
                  {m.endTime?` → End ${new Date(m.endTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`:''}
                  {m.startTime&&m.endTime?` (${Math.max(1,Math.round((m.endTime-m.startTime)/60000))} min)`:''}
                </div>

              <div style={{fontWeight:600,fontSize:'1rem'}}>{m.teamA.name} <span style={{color:'#d4a843'}}>vs</span> {m.teamB.name}</div>
              <div style={{marginTop:'6px',fontSize:'0.9rem',color:'#b8cfe8'}}>
                {m.teamA.name}: {m.teamA.score}/{m.teamA.wickets} &nbsp;|&nbsp; {m.teamB.name}: {m.teamB.score}/{m.teamB.wickets}
              </div>
            </div>
            <div style={{textAlign:'right'}}>
              {m.winner&&<div className="winner-badge">🏆 {m.winner}</div>}
              <div style={{display:'flex',gap:'6px',justifyContent:'flex-end',flexWrap:'wrap',marginTop:'6px'}}>
                <button className="btn btn-gold btn-sm" onClick={()=>setCelebMatch(m)}>🎉 Share</button>
                <button className="btn btn-outline btn-sm" onClick={()=>setExpanded(expanded===i?null:i)}>
                  {expanded===i?'Hide':'Details'}
                </button>
              </div>
            </div>
          </div>
          {expanded===i&&(
            <div style={{marginTop:'16px',borderTop:'1px solid #1e3a5f',paddingTop:'16px'}}>
              {[m.teamA,m.teamB].map((team,ti)=>{
                const opponent=ti===0?m.teamB:m.teamA;
                const oppBowlers=m.bowlers?Object.entries(m.bowlers).filter(([id])=>opponent.players.some(p=>String(p.id)===String(id))):[];
                return(
                <div key={team.name} style={{marginBottom:'16px'}}>
                  <div style={{fontWeight:600,color:'#d4a843',marginBottom:'8px'}}>{team.name} — Batting</div>
                  {team.players.map(p=>{
                    const bs=m.batsmen&&(m.batsmen[p.id]||m.batsmen[String(p.id)]);
                    if(!bs)return null;
                    return(
                      <div key={p.id} className="stat-row" style={{fontSize:'0.85rem'}}>
                        <span className="stat-label">{p.name} <span style={{color:bs.out?'#e74c3c':'#27ae60',fontSize:'0.75rem'}}>({bs.out?(bs.howOut||'out'):'not out'})</span></span>
                        <span className="stat-val">{bs.runs}({bs.balls}b) 1s:{bs.ones} 2s:{bs.twos} 4s:{bs.fours} 6s:{bs.sixes}</span>
                      </div>
                    );
                  })}
                  {oppBowlers.length>0&&(
                    <div style={{marginTop:'10px'}}>
                      <div style={{fontWeight:600,color:'#b8cfe8',marginBottom:'6px',fontSize:'0.85rem'}}>{opponent.name} — Bowling</div>
                      {oppBowlers.map(([id,b])=>{
                        const key=`${i}:${id}`;
                        return(
                        <div key={id}>
                          <div className="stat-row" style={{fontSize:'0.85rem',cursor:'pointer'}} onClick={()=>setOpenBowler(openBowler===key?null:key)}>
                            <span className="stat-label">{(opponent.players.find(p=>String(p.id)===String(id))||{name:'?'}).name} <span style={{color:'#7a9dbf',fontSize:'0.7rem'}}>{openBowler===key?'▲':'▾ balls'}</span></span>
                            <span className="stat-val">{b.overs}.{b.balls}ov | {b.runs}R | {b.wickets}W | Wd:{b.wides} NB:{b.noBalls}</span>
                          </div>

                        </div>
                        );
                      })}
                    </div>
                  )}
                </div>
                );
              })}
            </div>
          )}
        </div>
      ))}
      {celebMatch&&<CelebrationModal match={celebMatch} onClose={()=>setCelebMatch(null)}/>}
    </div>
  );
}

function BackupTab(){
  const [status,setStatus]=useState('');
  const [busy,setBusy]=useState(false);
  const tokenRef=useRef(null);          // current Google access token
  const clientRef=useRef(null);         // GIS token client
  const pendingRef=useRef(null);        // resolver for the token request
  const fileRef=useRef();

  const lastBackup=loadLS('ct_last_backup',null);

  // ---- Download / Restore a file (works everywhere, no setup) ----
  const downloadBackup=()=>{
    const text=JSON.stringify(buildBackup(),null,2);
    const blob=new Blob([text],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const stamp=new Date().toISOString().slice(0,16).replace(/[:T]/g,'-');
    a.href=url;a.download=`crictrack-backup-${stamp}.json`;
    document.body.appendChild(a);a.click();a.remove();
    URL.revokeObjectURL(url);
    saveLS('ct_last_backup',new Date().toISOString());
    setStatus('Backup file downloaded. Save it to your Google Drive folder to keep it safe.');
  };
  const onRestoreFile=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const obj=JSON.parse(ev.target.result);
        if(confirm('Restore this backup? It will overwrite the players, teams and matches currently on this device.')){
          restoreBackup(obj);
          alert('Backup restored. The app will now reload.');
          location.reload();
        }
      }catch(err){setStatus('Could not restore: '+(err.message||err));}
    };
    r.readAsText(f);
    e.target.value='';
  };

  // ---- Google Drive (OAuth) ----
  const initClient=()=>{
    if(clientRef.current)return true;
    if(!GDRIVE_CLIENT_ID)return false;
    if(!(window.google&&google.accounts&&google.accounts.oauth2))return false;
    clientRef.current=google.accounts.oauth2.initTokenClient({
      client_id:GDRIVE_CLIENT_ID,
      scope:'https://www.googleapis.com/auth/drive.file',
      callback:resp=>{
        if(resp&&resp.access_token){tokenRef.current=resp.access_token;pendingRef.current&&pendingRef.current.resolve(resp.access_token);}
        else pendingRef.current&&pendingRef.current.reject(new Error('Google sign-in was cancelled.'));
        pendingRef.current=null;
      }
    });
    return true;
  };
  const getToken=()=>new Promise((resolve,reject)=>{
    if(tokenRef.current){resolve(tokenRef.current);return;}
    if(!initClient()){
      reject(new Error(GDRIVE_CLIENT_ID?'Google library not loaded yet. Check your connection and try again.':'Google Drive is not set up. Add your GDRIVE_CLIENT_ID in index.html to enable it.'));
      return;
    }
    pendingRef.current={resolve,reject};
    clientRef.current.requestAccessToken();
  });
  const findFileId=async tk=>{
    let id=loadLS('ct_drive_file_id',null);
    if(id)return id;
    const q=encodeURIComponent(`name='${GDRIVE_FILE_NAME}' and trashed=false`);
    const res=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&spaces=drive&fields=files(id,name)`,{headers:{Authorization:`Bearer ${tk}`}});
    const j=await res.json();
    if(j.files&&j.files.length){saveLS('ct_drive_file_id',j.files[0].id);return j.files[0].id;}
    return null;
  };
  const uploadToDrive=async()=>{
    setBusy(true);
    try{
      setStatus('Connecting to Google Drive...');
      const tk=await getToken();
      setStatus('Uploading backup...');
      const content=JSON.stringify(buildBackup(),null,2);
      const fileId=await findFileId(tk);
      const metadata={name:GDRIVE_FILE_NAME,mimeType:'application/json'};
      const boundary='ctbnd'+Date.now();
      const body=`--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n`+
        `--${boundary}\r\nContent-Type: application/json\r\n\r\n${content}\r\n--${boundary}--`;
      const url=fileId
        ?`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart&fields=id`
        :`https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id`;
      const up=await fetch(url,{method:fileId?'PATCH':'POST',headers:{Authorization:`Bearer ${tk}`,'Content-Type':`multipart/related; boundary=${boundary}`},body});
      const upj=await up.json();
      if(upj.id){saveLS('ct_drive_file_id',upj.id);saveLS('ct_last_backup',new Date().toISOString());setStatus('Saved to Google Drive at '+new Date().toLocaleString()+'.');}
      else throw new Error((upj.error&&upj.error.message)||'Upload failed.');
    }catch(e){setStatus('Error: '+(e.message||e));}
    setBusy(false);
  };
  const restoreFromDrive=async()=>{
    setBusy(true);
    try{
      setStatus('Connecting to Google Drive...');
      const tk=await getToken();
      const fileId=await findFileId(tk);
      if(!fileId){setStatus('No backup found in your Google Drive yet.');setBusy(false);return;}
      setStatus('Downloading backup...');
      const res=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:`Bearer ${tk}`}});
      const obj=await res.json();
      if(confirm('Restore the backup from Google Drive? It will overwrite the data currently on this device.')){
        restoreBackup(obj);
        alert('Backup restored. The app will now reload.');
        location.reload();
      }else setBusy(false);
    }catch(e){setStatus('Error: '+(e.message||e));setBusy(false);}
  };

  return(
    <div>
      <div className="card">
        <h2>Backup &amp; Restore</h2>
        <div className="notice" style={{marginBottom:'16px'}}>
          Your data is saved in this browser automatically and survives page reloads.
          Use a backup so you never lose it if you clear the browser, switch device, or change browser.
          {lastBackup&&<div style={{marginTop:'8px',color:'#d4a843'}}>Last backup: {new Date(lastBackup).toLocaleString()}</div>}
        </div>

        <h3 style={{marginBottom:'10px'}}>Backup file (recommended)</h3>
        <div style={{display:'flex',gap:'10px',flexWrap:'wrap',marginBottom:'8px'}}>
          <button className="btn btn-gold" onClick={downloadBackup}>Download backup file</button>
          <button className="btn btn-outline" onClick={()=>fileRef.current.click()}>Restore from file</button>
          <input type="file" ref={fileRef} accept="application/json,.json" style={{display:'none'}} onChange={onRestoreFile}/>
        </div>
        <div style={{fontSize:'0.8rem',color:'#7a9dbf'}}>Tip: save the downloaded file inside your Google Drive folder (or Drive desktop sync) to keep an off-device copy.</div>
      </div>

      <div className="card">
        <h3 style={{marginBottom:'10px'}}>Google Drive</h3>
        {GDRIVE_CLIENT_ID
          ?<div style={{display:'flex',gap:'10px',flexWrap:'wrap'}}>
            <button className="btn btn-gold" disabled={busy} style={{opacity:busy?0.5:1}} onClick={uploadToDrive}>Upload to Google Drive</button>
            <button className="btn btn-outline" disabled={busy} style={{opacity:busy?0.5:1}} onClick={restoreFromDrive}>Restore from Google Drive</button>
          </div>
          :<div className="notice">Google Drive upload is not set up yet. Open index.html and paste your Google OAuth client ID into GDRIVE_CLIENT_ID, then host the app over https (for example GitHub Pages). Until then, use the backup file above.</div>
        }
        {status&&<div style={{marginTop:'14px',fontSize:'0.85rem',color:'#b8cfe8'}}>{status}</div>}
      </div>
    </div>
  );
}

// ===== Per-bowler ball-by-ball view =====
function ballChip(b){
  if(b.type==='wide')return {cls:'ball-wide',label:b.wicket?'Wd+W':'Wd'};
  if(b.type==='noball')return {cls:'ball-noball',label:b.wicket?'NB+W':'NB'};
  if(b.wicket)return {cls:'ball-wk',label:(b.runs?`${b.runs}+W`:'W')};
  if(b.runs===4)return {cls:'ball-4',label:'4'};
  if(b.runs===6)return {cls:'ball-6',label:'6'};
  if(b.runs===0)return {cls:'ball-dot',label:'·'};
  return {cls:'ball-1',label:String(b.runs)};
}
// Shows one row per over for a single bowler, drawn from the match ball history.
function BowlerBalls({match,bowlerId}){
  const balls=(match.ballHistory||[]).filter(b=>String(b.bowler)===String(bowlerId));
  if(!balls.length)return <div style={{fontSize:'0.75rem',color:'#7a9dbf',padding:'4px 0 10px'}}>No ball-by-ball data for this bowler (older match saved before this feature).</div>;
  const overs={};
  balls.forEach(b=>{const k=(b.over!=null?b.over:0);(overs[k]=overs[k]||[]).push(b);});
  return(
    <div style={{padding:'6px 0 12px'}}>
      {Object.keys(overs).sort((a,b)=>a-b).map(k=>(
        <div key={k} style={{display:'flex',alignItems:'center',gap:'5px',flexWrap:'wrap',marginBottom:'6px'}}>
          <span style={{fontSize:'0.72rem',color:'#7a9dbf',minWidth:'52px'}}>Over {Number(k)+1}</span>
          {overs[k].map((b,i)=>{const c=ballChip(b);return <div key={i} className={`ball ${c.cls}`} title={b.howOut||(b.type==='noball'?'no-ball':b.type==='wide'?'wide':`${b.batRuns} run(s)`)}>{c.label}</div>;})}
        </div>
      ))}
    </div>
  );
}

// ===== Export match history to Excel (.xlsx) =====
function exportMatchesXLSX(history){
  if(!window.XLSX){alert('The Excel library has not loaded yet. Check your internet connection and try again.');return;}
  if(!history||!history.length){alert('No matches to export yet.');return;}
  const XLSX=window.XLSX;
  const matches=[...history].reverse(); // history is newest-first; number oldest as match 1
  const fmtDate=m=>{const d=m.id?new Date(m.id):null;return d?d.toLocaleDateString():(m.date||'');};
  const fmtTS=ts=>ts?new Date(ts).toLocaleTimeString():'';

  const summary=[['Match #','Club / Tournament','Date','Start Time','End Time','Team A','Team B','Team A Score','Team B Score','Winner','Result','Overs']];
  const batting=[['Match #','Date','Team','Player','Runs','Balls','4s','6s','Status']];
  const bowling=[['Match #','Date','Team','Player','Overs','Runs','Wickets','Wides','No Balls']];
  const deliveries=[['Match #','Innings','Over.Ball','Bowler','Batsman','Outcome','Bat Runs','Extra','Wicket']];

  matches.forEach((m,idx)=>{
    const no=idx+1, date=fmtDate(m);
    const nameIn=id=>{const all=[...m.teamA.players,...m.teamB.players];const f=all.find(p=>String(p.id)===String(id));return f?f.name:'';};
    (m.ballHistory||[]).forEach(b=>{
      if(b.bowler==null&&b.striker==null)return; // older match without per-ball data
      const overBall=`${(b.over!=null?b.over:0)+1}.${(b.legalBefore!=null?b.legalBefore:0)+1}${b.isExtra?' (x)':''}`;
      const outcome=b.type==='wide'?'Wide':b.type==='noball'?'No ball':(b.wicket?'Wicket':(b.batRuns!=null?`${b.batRuns} run(s)`:`${b.runs} run(s)`));
      deliveries.push([no,b.innings||'',overBall,nameIn(b.bowler),nameIn(b.striker),outcome,b.batRuns!=null?b.batRuns:b.runs,b.extraRuns!=null?b.extraRuns:0,b.howOut||'']);
    });
    const res=computeResult(m);
    const result=(!m.winner)?'':(m.winner==='Tie'?'Match Tied':`${m.winner} ${res.margin}`);
    summary.push([no,m.clubName||'',date,fmtTS(m.startTime),fmtTS(m.endTime),m.teamA.name,m.teamB.name,`${m.teamA.score}/${m.teamA.wickets}`,`${m.teamB.score}/${m.teamB.wickets}`,m.winner||'',result,m.maxOvers]);
    [m.teamA,m.teamB].forEach(team=>{
      team.players.forEach(p=>{
        const bs=m.batsmen&&(m.batsmen[p.id]||m.batsmen[String(p.id)]);
        if(bs)batting.push([no,date,team.name,p.name,bs.runs,bs.balls,bs.fours,bs.sixes,bs.out?(bs.howOut||'out'):'not out']);
      });
    });
    if(m.bowlers)Object.entries(m.bowlers).forEach(([id,b])=>{
      const inA=m.teamA.players.find(p=>String(p.id)===String(id));
      const pl=inA||m.teamB.players.find(p=>String(p.id)===String(id));
      bowling.push([no,date,inA?m.teamA.name:m.teamB.name,pl?pl.name:'?',`${b.overs}.${b.balls}`,b.runs,b.wickets,b.wides,b.noBalls]);
    });
  });

  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(summary),'Matches');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(batting),'Batting');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(bowling),'Bowling');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(deliveries),'Deliveries');
  XLSX.writeFile(wb,`crictrack-matches-${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ===== End-of-match celebration image =====
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

function computeResult(m){
  const secondKey=m.battingTeam, firstKey=m.bowlingTeam;
  const first=m[`team${firstKey}`], second=m[`team${secondKey}`];
  let winnerKey=null;
  if(m.winner&&m.winner!=='Tie')winnerKey=(m.teamA.name===m.winner)?'A':(m.teamB.name===m.winner)?'B':null;
  let margin='Match Tied';
  if(winnerKey===secondKey){
    const inHand=(second.players.length-1)-second.wickets;
    margin=`won by ${inHand} wicket${inHand===1?'':'s'}`;
  }else if(winnerKey===firstKey){
    const runs=first.score-second.score;
    margin=`won by ${runs} run${runs===1?'':'s'}`;
  }
  return {winnerKey,margin,firstKey,secondKey};
}
function topScorer(m,key){
  let best=null;
  m[`team${key}`].players.forEach(p=>{const bs=m.batsmen[p.id]||m.batsmen[String(p.id)];if(bs&&(!best||bs.runs>best.runs))best={name:p.name,runs:bs.runs,balls:bs.balls};});
  return best;
}
function bestBowler(m,key){
  let best=null;
  m[`team${key}`].players.forEach(p=>{const b=m.bowlers[p.id]||m.bowlers[String(p.id)];if(b&&(!best||b.wickets>best.wickets||(b.wickets===best.wickets&&b.runs<best.runs)))best={name:p.name,wickets:b.wickets,runs:b.runs};});
  return best;
}

function collectBattingRows(m,key){
  return m[`team${key}`].players.map(p=>{
    const bs=m.batsmen[p.id]||m.batsmen[String(p.id)];
    if(!bs)return null;
    return {name:p.name,runs:bs.runs,balls:bs.balls,fours:bs.fours,sixes:bs.sixes,out:bs.out,howOut:bs.howOut||'out'};
  }).filter(Boolean);
}

function collectBowlingRows(m,key){
  return m[`team${key}`].players.map(p=>{
    const b=m.bowlers[p.id]||m.bowlers[String(p.id)];
    if(!b)return null;
    return {name:p.name,overs:b.overs,balls:b.balls,runs:b.runs,wickets:b.wickets,wides:b.wides,noBalls:b.noBalls};
  }).filter(Boolean);
}

function fitText(ctx,text,maxWidth){
  let value=String(text);
  if(ctx.measureText(value).width<=maxWidth)return value;
  while(value.length>1&&ctx.measureText(`${value}…`).width>maxWidth)value=value.slice(0,-1);
  return `${value}…`;
}

function drawCelebration(canvas,m){
  const W=1080,H=1080; canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  const res=computeResult(m);
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a1628');g.addColorStop(0.5,'#0f2040');g.addColorStop(1,'#0a1628');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#d4a843'; ctx.lineWidth=5; roundRect(ctx,24,24,W-48,H-48,28); ctx.stroke();

  const palette=['#d4a843','#27ae60','#2563eb','#dc2626','#8e44ad','#f39c12','#e8bc55','#16a085'];
  for(let i=0;i<120;i++){
    const x=Math.random()*W, y=Math.random()*350;
    ctx.save(); ctx.translate(x,y); ctx.rotate(Math.random()*Math.PI);
    ctx.fillStyle=palette[i%palette.length];
    const s=6+Math.random()*14; ctx.fillRect(-s/2,-s/2,s,s*0.55); ctx.restore();
  }

  ctx.textAlign='center';
  // Club / tournament name as the bold headline (falls back to the app name).
  const club=(m.clubName||'').trim();
  if(club){
    let cs=58; ctx.font=`900 ${cs}px "Playfair Display",Georgia,serif`;
    while(ctx.measureText(club).width>W-120&&cs>26){cs-=2;ctx.font=`900 ${cs}px "Playfair Display",Georgia,serif`;}
    ctx.fillStyle='#d4a843'; ctx.fillText(club,W/2,92);
    ctx.strokeStyle='#1e3a5f'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(W/2-150,118); ctx.lineTo(W/2+150,118); ctx.stroke();
    ctx.fillStyle='#7a9dbf'; ctx.font='600 22px "DM Sans",sans-serif'; ctx.fillText('CRICTRACK',W/2,146);
  }else{
    ctx.fillStyle='#7a9dbf'; ctx.font='600 30px "DM Sans",sans-serif';
    ctx.fillText('C R I C T R A C K',W/2,92);
  }
  ctx.font='128px serif'; ctx.fillText(res.winnerKey?'🏆':'🤝',W/2,300);
  ctx.fillStyle='#7a9dbf'; ctx.font='600 40px "DM Sans",sans-serif';
  ctx.fillText(res.winnerKey?'W I N N E R':'M A T C H   T I E D',W/2,388);

  const winnerName=res.winnerKey?(res.winnerKey==='A'?m.teamA.name:m.teamB.name):'';
  if(winnerName){
    let fs=92; ctx.font=`900 ${fs}px "Playfair Display",Georgia,serif`;
    while(ctx.measureText(winnerName).width>W-140&&fs>40){fs-=4;ctx.font=`900 ${fs}px "Playfair Display",Georgia,serif`;}
    ctx.fillStyle='#d4a843'; ctx.fillText(winnerName,W/2,480);
  }
  ctx.fillStyle='#e8dcc8'; ctx.font='500 46px "DM Sans",sans-serif';
  ctx.fillText(res.margin,W/2,res.winnerKey?548:480);

  const panelY=res.winnerKey?610:540;
  roundRect(ctx,80,panelY,W-160,182,18); ctx.fillStyle='#0a1628'; ctx.fill(); ctx.strokeStyle='#1e3a5f'; ctx.lineWidth=3; ctx.stroke();
  const drawRow=(key,yy)=>{
    const t=m[`team${key}`], isW=res.winnerKey===key;
    ctx.textAlign='left'; ctx.fillStyle=isW?'#d4a843':'#b8cfe8'; ctx.font=`${isW?'700':'500'} 40px "DM Sans",sans-serif`;
    let nm=t.name; if(ctx.measureText(nm).width>460)nm=nm.slice(0,16);
    ctx.fillText((isW?'🏆 ':'')+nm,118,yy);
    ctx.textAlign='right'; ctx.fillStyle=isW?'#d4a843':'#e8dcc8'; ctx.font='700 44px "DM Sans",sans-serif';
    ctx.fillText(`${t.score}/${t.wickets}  (${t.overs} ov)`,W-118,yy);
  };
  drawRow(res.firstKey,panelY+72);
  ctx.strokeStyle='#1e3a5f'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(118,panelY+98); ctx.lineTo(W-118,panelY+98); ctx.stroke();
  drawRow(res.secondKey,panelY+152);

  ctx.textAlign='center';
  const statsKey=res.winnerKey||res.firstKey;
  const ts=topScorer(m,statsKey), bb=bestBowler(m,statsKey);
  let sy=panelY+258;
  ctx.fillStyle='#7a9dbf'; ctx.font='600 32px "DM Sans",sans-serif';
  ctx.fillText('TOP PERFORMERS',W/2,sy); sy+=60;
  ctx.fillStyle='#e8dcc8'; ctx.font='500 38px "DM Sans",sans-serif';
  if(ts)ctx.fillText(`Top scorer:  ${ts.name}  ${ts.runs} (${ts.balls})`,W/2,sy); sy+=54;
  if(bb)ctx.fillText(`Best bowler:  ${bb.name}  ${bb.wickets}/${bb.runs}`,W/2,sy);

  ctx.fillStyle='#7a9dbf'; ctx.font='400 27px "DM Sans",sans-serif';
  ctx.fillText(`${m.date||''}     ${m.maxOvers} overs     Made with CricTrack`,W/2,H-58);
}

function drawFullMatchStats(canvas,m){
  const W=1440;
  const res=computeResult(m);
  const sections=[
    {title:'1st Innings',batKey:res.firstKey,bowlKey:res.secondKey},
    {title:'2nd Innings',batKey:res.secondKey,bowlKey:res.firstKey},
  ].map(section=>{
    const batting=collectBattingRows(m,section.batKey);
    const bowling=collectBowlingRows(m,section.bowlKey);
    return {...section,batting,bowling,height:168+Math.max(batting.length,bowling.length)*30};
  });
  const H=270+sections.reduce((sum,section)=>sum+section.height+24,0)+180;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');

  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#08111f');g.addColorStop(0.5,'#0f2040');g.addColorStop(1,'#08111f');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#d4a843'; ctx.lineWidth=5; roundRect(ctx,24,24,W-48,H-48,28); ctx.stroke();
  ctx.textAlign='center';

  const club=(m.clubName||'').trim();
  if(club){
    let fs=54; ctx.font=`900 ${fs}px "Playfair Display",Georgia,serif`;
    while(ctx.measureText(club).width>W-140&&fs>28){fs-=2;ctx.font=`900 ${fs}px "Playfair Display",Georgia,serif`;}
    ctx.fillStyle='#d4a843'; ctx.fillText(club,W/2,84);
  }else{
    ctx.fillStyle='#d4a843'; ctx.font='900 48px "Playfair Display",Georgia,serif';
    ctx.fillText('CRICTRACK MATCH REPORT',W/2,84);
  }
  ctx.fillStyle='#7a9dbf'; ctx.font='600 24px "DM Sans",sans-serif';
  ctx.fillText('COMPLETE MATCH STATISTICS',W/2,126);

  const winnerName=res.winnerKey?(res.winnerKey==='A'?m.teamA.name:m.teamB.name):'Tie';
  ctx.fillStyle='#e8dcc8'; ctx.font='700 34px "DM Sans",sans-serif';
  ctx.fillText(`${winnerName==='Tie'?'Match tied':`${winnerName} won`} • ${res.margin}`,W/2,176);
  ctx.fillStyle='#7a9dbf'; ctx.font='500 24px "DM Sans",sans-serif';
  ctx.fillText(`${m.teamA.name}: ${m.teamA.score}/${m.teamA.wickets}  |  ${m.teamB.name}: ${m.teamB.score}/${m.teamB.wickets}`,W/2,214);

  let y=262;
  sections.forEach((section,idx)=>{
    const battingTeam=m[`team${section.batKey}`];
    const bowlingTeam=m[`team${section.bowlKey}`];
    const leftRows=section.batting;
    const rightRows=section.bowling;
    const rowCount=Math.max(leftRows.length,rightRows.length);
    const cardH=section.height;
    roundRect(ctx,60,y,W-120,cardH,24); ctx.fillStyle='#0a1628'; ctx.fill(); ctx.strokeStyle='#1e3a5f'; ctx.lineWidth=3; ctx.stroke();

    ctx.textAlign='left';
    ctx.fillStyle='#d4a843'; ctx.font='700 28px "DM Sans",sans-serif';
    ctx.fillText(`${section.title} • ${battingTeam.name} batting`,92,y+44);
    ctx.textAlign='right';
    ctx.fillText(`${bowlingTeam.name} bowling`,W-92,y+44);
    ctx.fillStyle='#7a9dbf'; ctx.font='500 21px "DM Sans",sans-serif';
    ctx.fillText(`${battingTeam.score}/${battingTeam.wickets} in ${battingTeam.overs}.${battingTeam.balls} ov`,92,y+76);
    ctx.textAlign='right';
    ctx.fillText(`Extras ${battingTeam.extras}`,W-92,y+76);

    const leftX=92,rightX=W/2+24,tableTop=y+104,tableWidth=(W-184)/2;
    const rowYStart=tableTop+34;
    const rowH=30;

    const drawTableHeader=(x,title,labels,offsets)=>{
      ctx.textAlign='left';
      ctx.fillStyle='#b8cfe8'; ctx.font='700 19px "DM Sans",sans-serif';
      ctx.fillText(title,x,tableTop);
      ctx.fillStyle='#7a9dbf'; ctx.font='600 15px "DM Sans",sans-serif';
      labels.forEach((label,i)=>ctx.fillText(label,x+offsets[i],tableTop+24));
    };

    drawTableHeader(leftX,`${battingTeam.name} batting`,['Player','R','B','4s','6s','Status'],[0,220,280,350,410,470]);
    drawTableHeader(rightX,`${bowlingTeam.name} bowling`,['Bowler','Overs','R','W','Wd','NB'],[0,220,300,360,420,480]);

    ctx.font='500 18px "DM Sans",sans-serif';
    for(let i=0;i<rowCount;i++){
      const py=rowYStart+i*rowH;
      if(i<leftRows.length){
        const row=leftRows[i];
        ctx.fillStyle=i%2===0?'#0f2040':'#0c1a33';
        ctx.fillRect(leftX-10,py-18,tableWidth-12,rowH-2);
        ctx.fillStyle='#e8dcc8';
        ctx.fillText(fitText(ctx,row.name,210),leftX,py);
        ctx.fillText(String(row.runs),leftX+220,py);
        ctx.fillText(String(row.balls),leftX+280,py);
        ctx.fillText(String(row.fours),leftX+350,py);
        ctx.fillText(String(row.sixes),leftX+410,py);
        ctx.fillText(row.out?(fitText(ctx,row.howOut,118)):'not out',leftX+470,py);
      }
      if(i<rightRows.length){
        const row=rightRows[i];
        ctx.fillStyle=i%2===0?'#0f2040':'#0c1a33';
        ctx.fillRect(rightX-10,py-18,tableWidth-12,rowH-2);
        ctx.fillStyle='#e8dcc8';
        ctx.fillText(fitText(ctx,row.name,190),rightX,py);
        ctx.fillText(`${row.overs}.${row.balls}`,rightX+220,py);
        ctx.fillText(String(row.runs),rightX+300,py);
        ctx.fillText(String(row.wickets),rightX+360,py);
        ctx.fillText(String(row.wides),rightX+420,py);
        ctx.fillText(String(row.noBalls),rightX+485,py);
      }
    }

    y+=cardH+24;
  });

  const statsKey=res.winnerKey||res.firstKey;
  const ts=topScorer(m,statsKey), bb=bestBowler(m,statsKey);
  roundRect(ctx,60,y,W-120,136,20); ctx.fillStyle='#0f2040'; ctx.fill(); ctx.strokeStyle='#1e3a5f'; ctx.lineWidth=3; ctx.stroke();
  ctx.textAlign='left';
  ctx.fillStyle='#d4a843'; ctx.font='700 28px "DM Sans",sans-serif';
  ctx.fillText('TOP PERFORMERS',92,y+40);
  ctx.fillStyle='#e8dcc8'; ctx.font='500 24px "DM Sans",sans-serif';
  ctx.fillText(ts?`Top scorer: ${ts.name} ${ts.runs} (${ts.balls})`:'Top scorer: -',92,y+78);
  ctx.fillText(bb?`Best bowler: ${bb.name} ${bb.wickets}/${bb.runs}`:'Best bowler: -',92,y+110);
  ctx.fillStyle='#7a9dbf'; ctx.font='400 22px "DM Sans",sans-serif';
  ctx.textAlign='right';
  ctx.fillText(`${m.date||''}   •   ${m.maxOvers} overs   •   Made with CricTrack`,W-92,y+92);
}

function CelebrationModal({match,onClose}){
  const canvasRef=useRef();
  const [url,setUrl]=useState(null);
  const [mode,setMode]=useState('compact');

  useEffect(()=>{
    let cancelled=false;
    (async()=>{
      try{if(document.fonts&&document.fonts.ready)await document.fonts.ready;}catch(e){}
      if(cancelled||!canvasRef.current)return;
        if(mode==='compact')drawCelebration(canvasRef.current,match);
        else drawFullMatchStats(canvasRef.current,match);
      setUrl(canvasRef.current.toDataURL('image/png'));
    })();
    return ()=>{cancelled=true;};
    },[match,mode]);

    const fileName=mode==='compact'?'crictrack-result.png':'crictrack-full-stats.png';
    const download=()=>{if(!url)return;const a=document.createElement('a');a.href=url;a.download=fileName;document.body.appendChild(a);a.click();a.remove();};
  const share=()=>{
    const canvas=canvasRef.current; if(!canvas)return;
    canvas.toBlob(async blob=>{
        const file=new File([blob],fileName,{type:'image/png'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
          const shareText=mode==='compact'
            ?(match.winner==='Tie'?'Match Tied!':`${match.winner} won the match!`)
            :'Full match statistics from CricTrack';
          try{await navigator.share({files:[file],title:mode==='compact'?'CricTrack Result':'CricTrack Match Stats',text:shareText});}catch(e){}
      }else{download();}
    },'image/png');
  };

  return(
    <div className="alert-overlay" onClick={e=>{if(e.target.classList.contains('alert-overlay'))onClose();}}>
      <div className="alert-box" style={{maxWidth:'430px'}}>
          <h2>{mode==='compact'?'Match Result':'Match Statistics'}</h2>
          <div style={{display:'flex',gap:'8px',justifyContent:'center',flexWrap:'wrap',marginBottom:'12px'}}>
            <button className={`btn btn-sm ${mode==='compact'?'btn-gold':'btn-outline'}`} onClick={()=>setMode('compact')}>Compact card</button>
            <button className={`btn btn-sm ${mode==='full'?'btn-gold':'btn-outline'}`} onClick={()=>setMode('full')}>Full stats</button>
          </div>
        <canvas ref={canvasRef} style={{display:'none'}}/>
        {url?<img src={url} alt="Match result" style={{width:'100%',borderRadius:'12px',border:'2px solid #d4a843'}}/>:<div className="notice">Generating image...</div>}
        <div style={{display:'flex',gap:'10px',justifyContent:'center',marginTop:'16px',flexWrap:'wrap'}}>
            <button className="btn btn-gold btn-big" onClick={share}>{mode==='compact'?'Share card':'Share stats'}</button>
          <button className="btn btn-outline btn-big" onClick={download}>Download</button>
          <button className="btn btn-outline btn-big" onClick={onClose}>Close</button>
        </div>
          <div style={{fontSize:'0.78rem',color:'#7a9dbf',marginTop:'10px'}}>{mode==='compact'?'Compact card shows the winner and top performers.':'Full stats shows both innings batting and bowling scorecards.'}</div>
      </div>
    </div>
  );
}

function AlertModal({alert}){
  return(
    <div className="alert-overlay">
      <div className="alert-box">
        <h2>{alert.title}</h2>
        <p style={{whiteSpace:'pre-line'}}>{alert.msg}</p>
        {alert.choices
          ?<div style={{display:'flex',gap:'12px',justifyContent:'center',flexWrap:'wrap'}}>
            {alert.choices.map(c=><button key={c.val} className="btn btn-gold btn-big" onClick={()=>alert.ok(c.val)}>{c.label}</button>)}
          </div>
          :<button className="btn btn-gold btn-big" onClick={alert.ok}>Continue</button>
        }
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
